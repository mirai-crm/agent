name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libusb
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev pkg-config
      - run: go test ./...
      - run: go vet ./...

  build-linux:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libusb
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X github.com/mirai-agent/mirai-agent/internal/version.Version=${VERSION}" \
            -o "dist/mirai-agent_linux_${GOARCH}" ./cmd/agent
      - uses: actions/upload-artifact@v4
        with:
          name: mirai-agent_linux_${{ matrix.goarch }}
          path: dist/mirai-agent_linux_${{ matrix.goarch }}
          if-no-files-found: error

  build-macos:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-15-intel
            goarch: amd64
          - runner: macos-15
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libusb
        run: brew install libusb pkg-config
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig"
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X github.com/mirai-agent/mirai-agent/internal/version.Version=${VERSION}" \
            -o "dist/mirai-agent_darwin_${GOARCH}" ./cmd/agent
      - uses: actions/upload-artifact@v4
        with:
          name: mirai-agent_darwin_${{ matrix.goarch }}
          path: dist/mirai-agent_darwin_${{ matrix.goarch }}
          if-no-files-found: error

  build-windows:
    needs: test
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libusb
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: gcc
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X github.com/mirai-agent/mirai-agent/internal/version.Version=${VERSION}" \
            -o "dist/mirai-agent_windows_amd64.exe" ./cmd/agent
          cp /mingw64/bin/libusb-1.0.dll "dist/libusb-1.0_windows_amd64.dll"
      - uses: actions/upload-artifact@v4
        with:
          name: mirai-agent_windows_amd64
          path: |
            dist/mirai-agent_windows_amd64.exe
            dist/libusb-1.0_windows_amd64.dll
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staging
      - name: Collect artifacts and build manifest
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          find staging -type f -exec cp {} dist/ \;

          for asset in \
            mirai-agent_linux_amd64 \
            mirai-agent_linux_arm64 \
            mirai-agent_darwin_amd64 \
            mirai-agent_darwin_arm64 \
            mirai-agent_windows_amd64.exe \
            libusb-1.0_windows_amd64.dll
          do
            test -s "dist/${asset}"
          done

          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          jq -n \
            --arg version "$VERSION" \
            --arg linux_amd64_url "${BASE_URL}/mirai-agent_linux_amd64" \
            --arg linux_arm64_url "${BASE_URL}/mirai-agent_linux_arm64" \
            --arg darwin_amd64_url "${BASE_URL}/mirai-agent_darwin_amd64" \
            --arg darwin_arm64_url "${BASE_URL}/mirai-agent_darwin_arm64" \
            --arg windows_amd64_url "${BASE_URL}/mirai-agent_windows_amd64.exe" \
            --arg libusb_url "${BASE_URL}/libusb-1.0_windows_amd64.dll" \
            '{
              version: $version,
              platforms: {
                "linux/amd64": {
                  binary_url: $linux_amd64_url
                },
                "linux/arm64": {
                  binary_url: $linux_arm64_url
                },
                "darwin/amd64": {
                  binary_url: $darwin_amd64_url
                },
                "darwin/arm64": {
                  binary_url: $darwin_arm64_url
                },
                "windows/amd64": {
                  binary_url: $windows_amd64_url,
                  libusb_url: $libusb_url
                }
              }
            }' > dist/latest.json
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            mapfile -t ASSETS < <(find dist -maxdepth 1 -type f ! -name latest.json | sort)
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release upload "$TAG" dist/latest.json --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
