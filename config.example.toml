[[devices]]
token = "dev_live_pos_123456..."
id = 46
name = "Front POS"
type = "pos_terminal"

  [devices.pos]
  # Direct TCP only (Wi-Fi/Ethernet). The terminal's default port is usually 2000.
  address = "192.0.2.25:2000"
  connect_timeout_seconds = 5
  operation_timeout_seconds = 180

    # TIN (ЄДРПОУ/ДРФО) from the CRM purchase task -> terminal merchant index.
    [devices.pos.merchant_ids]
    "1111111111" = "1"
    "2222222222" = "3"
